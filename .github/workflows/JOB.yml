name: CI/CD - Build, Push, and Deploy
on:
  push:
    branches: [ "Dev" ]
  workflow_dispatch:
jobs:
  build-and-push:
    runs-on: ubuntu-latest
    name: Build and Push to Docker Hub
    steps:
      - name: 1. Checkout Repository
        uses: actions/checkout@v4
        
      - name: 2. Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9' 
      - name: 3. Install dependencies
        run: |
          pip install -r app/requirements.txt
          pip install pytest 

      - name: 4. Train the model
        run: python app/models/train.py
 
      - name: 5. Run Tests
        env:
          PYTHONPATH: ${{ github.workspace }}
        run:  pytest  

      - name: 6. Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 7. Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      - name: 8. Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile 
          push: true
          tags: |
            ${{ secrets.DOCKER_HUB_USERNAME }}/mlops-ca3:latest
            ${{ secrets.DOCKER_HUB_USERNAME }}/mlops-ca3:${{ github.sha }}

  deploy-to-minikube:
    runs-on: ubuntu-latest
    name: Deploy to Minikube
    needs: build-and-push
    steps:
      - name: 1. Checkout Repository
        uses: actions/checkout@v4

      - name: 2. Set up and Start Minikube
        uses: medyagh/setup-minikube@latest
      - name: 4. Update Deployment with new Image Tag
        run: |
          sed -i "s|__IMAGE_NAME__|${{ env.DOCKER_IMAGE }}:${{ needs.build-and-push.outputs.image_tag }}|g" app/k8s/deployment.yaml
          echo "--- Updated deployment.yaml (app/k8s/deployment.yaml) ---"
          cat app/k8s/deployment.yaml

      - name: 5. Deploy Application to Minikube
        run: |
          echo "Applying Kubernetes manifests..."
          kubectl apply -f app/k8s/deployment.yaml
          kubectl apply -f app/k8s/service.yaml

      - name: 6. Debug Deployment
        run: |
          echo "Pausing for 20 seconds to allow pods to try and start..."
          sleep 20
          
          echo "\n--- Pod Status (Look for ImagePullBackOff or CrashLoopBackOff) ---"
          kubectl get pods -l app=my-ml-app

          echo "\n--- Describe Pods (Look at the Events section at the bottom for errors) ---"
          kubectl describe pods -l app=my-ml-app
          
          echo "\n--- Pod Logs (Look for Python errors if the pod is crashing) ---"
          kubectl logs -l app=my-ml-app --all-containers

      - name: 7. Verify Deployment
        run: |
          echo "Waiting for deployment to be ready..."
          kubectl rollout status deployment/ml-app --timeout=120s 
          echo -e "\n--- Pod Status ---"
          kubectl get pods
          echo -e "\n--- Service Status ---"
          kubectl get service
      
