name: CI/CD - Test, Build, and Push Docker Image

on:
  push:
    branches: [ "Dev" ] # Trigger on pushes to the main branch
  workflow_dispatch:

jobs:
  test-build-and-push:
    runs-on: ubuntu-latest # Use a GitHub-hosted runner

    steps:
      # Step 1: Checkout the repository code
      - name: Checkout repository
        uses: actions/checkout@v4

      # Step 2: Set up Python environment for testing
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9' # Match the Python version in your Dockerfile

      # Step 3: Install dependencies for testing
      - name: Install dependencies
        run: |
          pip install -r app/requirements.txt
          pip install pytest # Install pytest for testing

  
      # Step 5: Set up Docker Buildx for advanced features
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Step 6: Log in to Docker Hub
      # This uses secrets stored in your repository settings for security
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_ACCESS_TOKEN }}

      # Step 7: Build the Docker image and push to Docker Hub
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .app
          file: .docker/Dockerfile
          push: true # This boolean tells the action to push after building
          tags: |
            ${{ secrets.DOCKER_HUB_USERNAME }}/mlops-ca3:latest
            ${{ secrets.DOCKER_HUB_USERNAME }}/mlops-ca3:${{ github.sha }}
          # The image is tagged with 'latest' and the Git commit SHA for versioning
